name: Discover AMC showtimes

on:
  schedule:
    # Every 3 hours. AMC posts new dates roughly weekly, so this is just to
    # notice a new posting reasonably promptly without polling too often.
    - cron: "17 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: discover-showtimes
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Discover showtimes
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run discover

      - name: Persist discovered-showtime and cooldown state
        run: |
          # `git add data/*.json` would fail hard if a file (e.g. the cooldown
          # file, which only exists after a rate-limit) isn't present, so add
          # the whole directory instead of naming files that might not exist.
          if [ -n "$(git status --porcelain -- data/)" ]; then
            git config user.name "amc-ticket-checker-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/
            git commit -m "Update discovered showtimes [skip ci]"
            # check-seats.yml also commits to this repo independently, so
            # rebase before pushing in case it landed a commit meanwhile.
            git pull --rebase origin main
            git push
          fi
