name: Check AMC seats

on:
  schedule:
    # Every 5 minutes. GitHub may delay this under load - treat as "best effort".
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: check-seats
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Check seats
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run check

      - name: Persist seen-seat and cooldown state
        run: |
          # `git add data/*.json` would fail hard if a file (e.g. the cooldown
          # file, which only exists after a rate-limit) isn't present, so add
          # the whole directory instead of naming files that might not exist.
          if [ -n "$(git status --porcelain -- data/)" ]; then
            git config user.name "amc-ticket-checker-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/
            git commit -m "Update seen-seat state [skip ci]"
            # discover-showtimes.yml also commits to this repo independently,
            # so rebase before pushing in case it landed a commit meanwhile.
            git pull --rebase origin main
            git push
          fi
